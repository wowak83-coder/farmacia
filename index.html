<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farmacia di Casa</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1A1612">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Farmacia">
<link rel="apple-touch-icon" href="icon-192.png">

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F7F3EE; --warm-white: #FDFAF7; --ink: #1A1612;
    --ink-soft: #4A3F35; --ink-muted: #8C7D70;
    --rust: #C4552A; --sage: #5B7B5E; --amber: #D4891A;
    --border: #E0D6CC; --shadow: rgba(26,22,18,0.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--cream); color:var(--ink); min-height:100vh; }

  header {
    background:var(--ink); padding:1.2rem 1.5rem;
    display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:100;
  }
  .logo { display:flex; align-items:center; gap:.6rem; }
  .logo h1 { font-family:'DM Serif Display',serif; font-size:1.3rem; color:var(--cream); }
  .header-right { display:flex; align-items:center; gap:1rem; }
  .header-stats { display:flex; gap:1rem; }
  .stat { text-align:right; }
  .stat-number { font-family:'DM Serif Display',serif; font-size:1.3rem; color:var(--cream); line-height:1; }
  .stat-label { font-size:.55rem; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-muted); }

  .drive-status {
    display:flex; align-items:center; gap:.4rem; font-size:.7rem; color:var(--ink-muted);
    padding:.4rem .8rem; border:1px solid #333; border-radius:2px; cursor:pointer; white-space:nowrap;
  }
  .drive-status .dot { width:6px; height:6px; border-radius:50%; background:#555; flex-shrink:0; }
  .drive-status.connected .dot { background:#5B7B5E; }
  .drive-status.connected { color:#8AAE8D; border-color:#2a3d2b; }
  .drive-status.syncing .dot { background:var(--amber); animation:pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  main { max-width:700px; margin:0 auto; padding:1.5rem 1rem; }

  .alert-banner {
    background:#FEF5E0; border:1px solid #F0C060; border-left:4px solid var(--amber);
    border-radius:2px; padding:.8rem 1rem; margin-bottom:1.5rem;
    display:none; align-items:center; gap:.6rem; font-size:.85rem; color:#7A5A10;
  }

  .form-card {
    background:var(--warm-white); border:1px solid var(--border); border-radius:2px;
    padding:1.5rem; margin-bottom:2rem; position:relative; overflow:hidden;
  }
  .form-card::before { content:''; position:absolute; left:0;top:0;bottom:0; width:4px; background:var(--ink); }
  .form-title { font-family:'DM Serif Display',serif; font-size:1.1rem; margin-bottom:1.2rem; padding-left:.8rem; }
  .form-col { display:flex; flex-direction:column; gap:.8rem; }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:.8rem; }
  .field { display:flex; flex-direction:column; gap:.3rem; }
  label { font-size:.6rem; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-muted); font-weight:500; }
  input, select {
    font-family:'DM Sans',sans-serif; font-size:1rem; padding:.7rem .9rem;
    background:var(--cream); border:1px solid var(--border); border-radius:2px;
    color:var(--ink); outline:none; -webkit-appearance:none; transition:border-color .2s;
  }
  input:focus, select:focus { border-color:var(--ink); }
  input::placeholder { color:var(--ink-muted); }
  .btn-add {
    font-family:'DM Sans',sans-serif; font-size:.9rem; font-weight:600;
    padding:.8rem; background:var(--ink); color:var(--cream);
    border:none; border-radius:2px; cursor:pointer; width:100%;
    transition:background .2s; margin-top:.4rem;
  }
  .btn-add:active { background:#2D2620; }
  .btn-add:disabled { opacity:.4; cursor:not-allowed; }

  .toolbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem; gap:.5rem; }
  .section-title { font-family:'DM Serif Display',serif; font-size:1.4rem; }
  .filters { display:flex; gap:.3rem; flex-wrap:wrap; }
  .filter-btn {
    font-size:.65rem; font-weight:500; letter-spacing:.06em; text-transform:uppercase;
    padding:.4rem .7rem; border:1px solid var(--border); border-radius:2px;
    background:transparent; color:var(--ink-muted); cursor:pointer;
  }
  .filter-btn.active { background:var(--ink); color:var(--cream); border-color:var(--ink); }

  .medicine-list { display:flex; flex-direction:column; gap:.5rem; }
  .medicine-item {
    background:var(--warm-white); border:1px solid var(--border); border-radius:2px;
    display:grid; grid-template-columns:4px 1fr auto;
    gap:.8rem; padding:.9rem 1rem; animation:slideIn .2s ease; align-items:center;
  }
  @keyframes slideIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
  .status-bar { width:4px; height:32px; border-radius:2px; }
  .status-ok { background:var(--sage); }
  .status-warn { background:var(--amber); }
  .status-exp { background:var(--rust); }
  .med-info { min-width:0; }
  .med-name { font-family:'DM Serif Display',serif; font-size:1rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .med-meta { font-size:.72rem; color:var(--ink-muted); margin-top:.15rem; display:flex; gap:.6rem; flex-wrap:wrap; align-items:center; }
  .badge { display:inline-block; padding:.15rem .5rem; border-radius:2px; font-size:.65rem; font-weight:600; letter-spacing:.06em; text-transform:uppercase; }
  .badge-ok   { background:#EAF2EB; color:var(--sage); }
  .badge-warn { background:#FEF5E0; color:var(--amber); }
  .badge-exp  { background:#FAECE8; color:var(--rust); }
  .btn-delete { background:none; border:none; color:var(--border); font-size:1.1rem; cursor:pointer; padding:.3rem; flex-shrink:0; }
  .btn-delete:active { color:var(--rust); }

  .empty-state { text-align:center; padding:4rem 1rem; }
  .empty-icon { font-size:3rem; margin-bottom:1rem; opacity:.4; }
  .empty-state p { font-family:'DM Serif Display',serif; font-size:1.1rem; color:var(--ink-soft); }
  .empty-state small { font-size:.8rem; color:var(--ink-muted); display:block; margin-top:.3rem; }

  /* LOGIN */
  .login-overlay {
    position:fixed; inset:0; background:var(--ink);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:999; gap:1.2rem; padding:2rem;
  }
  .login-overlay h2 { font-family:'DM Serif Display',serif; font-size:2rem; color:var(--cream); }
  .login-overlay p { color:var(--ink-muted); font-size:.9rem; text-align:center; max-width:320px; line-height:1.6; }
  .btn-google {
    display:flex; align-items:center; gap:.8rem; padding:.9rem 2rem;
    background:var(--cream); color:var(--ink); border:none; border-radius:2px;
    font-family:'DM Sans',sans-serif; font-size:.95rem; font-weight:600; cursor:pointer;
    text-decoration:none;
  }
  .btn-google svg { width:20px; height:20px; }

  /* iOS install banner */
  .install-banner {
    background:#1e2d1f; border:1px solid #2a3d2b; border-radius:2px;
    padding:.8rem 1rem; margin-bottom:1.2rem;
    display:none; align-items:center; justify-content:space-between; gap:.8rem;
  }
  .install-banner span { font-size:.82rem; color:#8AAE8D; }
  .btn-dismiss { background:none; border:none; color:#4a5e4b; font-size:1rem; cursor:pointer; }

  .sync-toast {
    position:fixed; bottom:1.5rem; right:1rem; left:1rem;
    background:var(--ink); color:var(--cream); padding:.7rem 1rem;
    border-radius:2px; font-size:.8rem; text-align:center;
    opacity:0; transition:opacity .3s; pointer-events:none; z-index:200;
  }
  .sync-toast.show { opacity:1; }

  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
</style>
</head>
<body>

<div class="login-overlay" id="loginOverlay" style="display:none">
  <div style="font-size:3.5rem">⚕</div>
  <h2>Farmacia di Casa</h2>
  <p>Accedi con Google per salvare i medicinali su Drive e consultarli da qualsiasi dispositivo.</p>
  <a class="btn-google" id="btnLogin" href="#">
    <svg viewBox="0 0 48 48">
      <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.2l6.8-6.8C35.8 2.5 30.2 0 24 0 14.8 0 6.9 5.4 3 13.3l7.9 6.1C12.7 13.2 17.9 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4 6.9-9.9 6.9-17z"/>
      <path fill="#FBBC05" d="M10.9 28.6A14.8 14.8 0 0 1 9.5 24c0-1.6.3-3.1.8-4.6L2.4 13.3A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.6 10.7l8.3-6.1z"/>
      <path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.1 0-11.3-3.7-13.1-9l-7.9 6.1C6.9 42.6 14.8 48 24 48z"/>
    </svg>
    Accedi con Google
  </a>
</div>

<div class="sync-toast" id="syncToast">✓ Salvato su Drive</div>

<header>
  <div class="logo">
    <span style="font-size:1.3rem">⚕</span>
    <h1>Farmacia di Casa</h1>
  </div>
  <div class="header-right">
    <div class="header-stats">
      <div class="stat"><div class="stat-number" id="statTotale">0</div><div class="stat-label">Tot</div></div>
      <div class="stat"><div class="stat-number" id="statScaduti">0</div><div class="stat-label">Scad</div></div>
      <div class="stat"><div class="stat-number" id="statWarn">0</div><div class="stat-label">Avvisi</div></div>
    </div>
    <div class="drive-status" id="driveStatus" onclick="handleDriveClick()">
      <div class="dot"></div>
      <span id="driveStatusText">Drive</span>
    </div>
  </div>
</header>

<main>
  <div class="install-banner" id="installBanner">
    <span id="installText"></span>
    <button class="btn-dismiss" onclick="document.getElementById('installBanner').style.display='none'">✕</button>
  </div>

  <div class="alert-banner" id="alertBanner">⚠️ <strong id="alertText"></strong></div>

  <div class="form-card">
    <div class="form-title">+ Aggiungi medicinale</div>
    <div class="form-col">
      <div class="field"><label>Nome medicinale</label><input type="text" id="inNome" placeholder="es. Tachipirina 1000mg"/></div>
      <div class="form-row">
        <div class="field">
          <label>Categoria</label>
          <select id="inCategoria">
            <option>Analgesico</option><option>Antibiotico</option><option>Antinfiammatorio</option>
            <option>Antiistaminico</option><option>Gastrointestinale</option><option>Vitamina/Integratore</option>
            <option>Collirio/Nasale</option><option>Cerotti/Bende</option><option>Altro</option>
          </select>
        </div>
        <div class="field"><label>Scadenza</label><input type="month" id="inScadenza"/></div>
      </div>
      <div class="form-row">
        <div class="field"><label>Quantità</label><input type="text" id="inQuantita" placeholder="es. 1 scatola"/></div>
        <div class="field"><label>Note</label><input type="text" id="inNote" placeholder="opzionale"/></div>
      </div>
      <button class="btn-add" id="btnAdd" onclick="aggiungi()" disabled>Aggiungi</button>
    </div>
  </div>

  <div class="toolbar">
    <div class="section-title">Medicinali</div>
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('tutti',this)">Tutti</button>
      <button class="filter-btn" onclick="setFilter('ok',this)">✓ OK</button>
      <button class="filter-btn" onclick="setFilter('warn',this)">⚡ Presto</button>
      <button class="filter-btn" onclick="setFilter('exp',this)">✗ Scaduti</button>
    </div>
  </div>

  <div class="medicine-list" id="lista"></div>
</main>

<script>
// ---- CONFIG ----
const CLIENT_ID   = '92383532067-nrhjunlpl0o7dch09t20jr95t7o7m4ge.apps.googleusercontent.com';
const REDIRECT_URI = 'https://wowak83-coder.github.io/farmacia/';
const SCOPE       = 'https://www.googleapis.com/auth/drive.appdata';
const FNAME       = 'medicinali.json';

let token = null, fileId = null, medicinali = [], filtro = 'tutti', saveTimer = null;

// ---- SERVICE WORKER ----
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(console.error);
}

// ---- OAUTH REDIRECT FLOW ----
// Costruisce l'URL di autorizzazione Google
function buildAuthUrl() {
  const params = new URLSearchParams({
    client_id:     CLIENT_ID,
    redirect_uri:  REDIRECT_URI,
    response_type: 'token',
    scope:         SCOPE,
    include_granted_scopes: 'true',
    prompt: 'select_account'
  });
  return 'https://accounts.google.com/o/oauth2/v2/auth?' + params.toString();
}

// Al caricamento della pagina, controlla se siamo tornati da Google con un token
function checkRedirectToken() {
  // Il token arriva nell'hash dell'URL: #access_token=xxx&...
  const hash = window.location.hash.substring(1);
  if (!hash) return null;
  const params = new URLSearchParams(hash);
  const t = params.get('access_token');
  const err = params.get('error');
  // Pulisci l'URL
  history.replaceState(null, '', window.location.pathname);
  if (err) { console.error('OAuth error:', err); return null; }
  return t;
}

function handleDriveClick() {
  if (!token) showLogin();
}

function showLogin() {
  document.getElementById('loginOverlay').style.display = 'flex';
}

document.getElementById('btnLogin').onclick = (e) => {
  e.preventDefault();
  window.location.href = buildAuthUrl();
};

function setStatus(cls, txt) {
  const el = document.getElementById('driveStatus');
  el.className = 'drive-status ' + cls;
  document.getElementById('driveStatusText').textContent = txt;
}

// ---- DRIVE ----
async function loadDrive() {
  try {
    const res = await driveReq(`https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name='${FNAME}'&fields=files(id)`);
    if (res.files?.length) {
      fileId = res.files[0].id;
      const r = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      medicinali = await r.json();
    } else {
      medicinali = [];
      await createFile();
    }
    setStatus('connected', 'Drive ✓');
    render();
  } catch(e) {
    console.error(e);
    setStatus('', 'Errore');
  }
}

async function driveReq(url, opts = {}) {
  const r = await fetch(url, {
    ...opts,
    headers: { Authorization: `Bearer ${token}`, ...(opts.headers||{}) }
  });
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

async function createFile() {
  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify({ name: FNAME, parents: ['appDataFolder'] })], { type: 'application/json' }));
  form.append('file', new Blob([JSON.stringify([])], { type: 'application/json' }));
  const r = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', {
    method: 'POST', headers: { Authorization: `Bearer ${token}` }, body: form
  });
  fileId = (await r.json()).id;
}

async function saveDrive() {
  if (!token || !fileId) return;
  setStatus('syncing', 'Salvo...');
  try {
    await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
      method: 'PATCH',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(medicinali)
    });
    setStatus('connected', 'Drive ✓');
    const t = document.getElementById('syncToast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  } catch(e) {
    setStatus('', 'Errore salvataggio');
  }
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveDrive, 800);
}

// ---- HELPERS ----
function getStatus(s) {
  const [y,m] = s.split('-').map(Number);
  const d = (new Date(y, m, 0) - new Date()) / 86400000;
  return d < 0 ? 'exp' : d <= 90 ? 'warn' : 'ok';
}
function badge(s) {
  return s==='exp'  ? '<span class="badge badge-exp">Scaduto</span>'
       : s==='warn' ? '<span class="badge badge-warn">In scadenza</span>'
       : '<span class="badge badge-ok">Valido</span>';
}
function fmtDate(s) {
  const [y,m] = s.split('-');
  return ['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'][+m-1]+' '+y;
}
function icon(c) {
  return {Analgesico:'🩹',Antibiotico:'💉',Antinfiammatorio:'🔥',Antiistaminico:'🌿',
    Gastrointestinale:'🫀','Vitamina/Integratore':'💊','Collirio/Nasale':'👁','Cerotti/Bende':'🩹',Altro:'📦'}[c]||'💊';
}

// ---- RENDER ----
function render() {
  const lista = document.getElementById('lista');
  let items = medicinali.filter(m => filtro==='tutti' || getStatus(m.scadenza)===filtro);
  items.sort((a,b) => {
    const o={exp:0,warn:1,ok:2};
    const d = o[getStatus(a.scadenza)] - o[getStatus(b.scadenza)];
    return d || a.scadenza.localeCompare(b.scadenza);
  });

  lista.innerHTML = !items.length
    ? `<div class="empty-state"><div class="empty-icon">💊</div><p>Nessun medicinale trovato</p><small>Aggiungi il tuo primo medicinale qui sopra</small></div>`
    : items.map(m => {
        const s = getStatus(m.scadenza);
        return `<div class="medicine-item">
          <div class="status-bar status-${s}"></div>
          <div class="med-info">
            <div class="med-name">${m.nome}</div>
            <div class="med-meta">
              <span>${icon(m.categoria)} ${m.categoria}</span>
              <span>📅 ${fmtDate(m.scadenza)}</span>
              ${m.quantita ? `<span>📦 ${m.quantita}</span>` : ''}
              ${badge(s)}
            </div>
            ${m.note ? `<div style="font-size:.72rem;color:var(--ink-muted);margin-top:.2rem;font-style:italic">${m.note}</div>` : ''}
          </div>
          <button class="btn-delete" onclick="elimina('${m.id}')">✕</button>
        </div>`;
      }).join('');

  document.getElementById('statTotale').textContent = medicinali.length;
  document.getElementById('statScaduti').textContent = medicinali.filter(m=>getStatus(m.scadenza)==='exp').length;
  document.getElementById('statWarn').textContent = medicinali.filter(m=>getStatus(m.scadenza)==='warn').length;

  const sc = medicinali.filter(m=>getStatus(m.scadenza)==='exp').length;
  const wa = medicinali.filter(m=>getStatus(m.scadenza)==='warn').length;
  const banner = document.getElementById('alertBanner');
  if (sc||wa) {
    const p = [];
    if (sc) p.push(`${sc} medicinale${sc>1?'i':''} scadut${sc>1?'i':'o'}`);
    if (wa) p.push(`${wa} in scadenza nei prossimi 3 mesi`);
    document.getElementById('alertText').textContent = p.join(' · ') + ' — controlla l\'armadietto!';
    banner.style.display = 'flex';
  } else banner.style.display = 'none';
}

// ---- ACTIONS ----
function aggiungi() {
  const nome = document.getElementById('inNome').value.trim();
  const scadenza = document.getElementById('inScadenza').value;
  if (!nome||!scadenza) { shake(document.querySelector('.form-card')); return; }
  medicinali.push({
    id: Date.now().toString(),
    nome,
    categoria: document.getElementById('inCategoria').value,
    scadenza,
    quantita: document.getElementById('inQuantita').value.trim(),
    note: document.getElementById('inNote').value.trim()
  });
  scheduleSave(); render();
  ['inNome','inScadenza','inQuantita','inNote'].forEach(id => document.getElementById(id).value = '');
}

function elimina(id) {
  medicinali = medicinali.filter(m => m.id !== id);
  scheduleSave(); render();
}

function setFilter(f, btn) {
  filtro = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function shake(el) {
  el.style.animation = 'none'; el.offsetHeight;
  el.style.animation = 'shake .3s ease';
  el.addEventListener('animationend', () => el.style.animation = '', { once: true });
}

// ---- iOS INSTALL HINT ----
const isIOS = /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
const isStandalone = window.navigator.standalone;
if (isIOS && !isStandalone && token) {
  const b = document.getElementById('installBanner');
  document.getElementById('installText').textContent = '📲 Tocca  e poi "Aggiungi a schermata Home" per installare l\'app';
  b.style.display = 'flex';
}

// ---- INIT ----
async function init() {
  const t = checkRedirectToken();
  if (t) {
    token = t;
    // Salva il token in sessionStorage per non perderlo su reload
    sessionStorage.setItem('farm_token', t);
  } else {
    // Prova a recuperare dalla sessione
    const saved = sessionStorage.getItem('farm_token');
    if (saved) token = saved;
  }

  if (token) {
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('btnAdd').disabled = false;
    setStatus('syncing', 'Caricamento...');
    await loadDrive();

    // Mostra hint iOS install dopo il login
    if (isIOS && !isStandalone) {
      const b = document.getElementById('installBanner');
      document.getElementById('installText').textContent = '📲 Tocca ↑ e poi "Aggiungi a schermata Home" per installare l\'app';
      b.style.display = 'flex';
    }
  } else {
    document.getElementById('loginOverlay').style.display = 'flex';
  }
}

init();
