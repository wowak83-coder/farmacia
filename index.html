<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farmacia di Casa</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1A1612">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Farmacia">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#F7F3EE;--warm-white:#FDFAF7;--ink:#1A1612;
  --ink-soft:#4A3F35;--ink-muted:#8C7D70;
  --rust:#C4552A;--rust-light:#FAECE8;
  --sage:#5B7B5E;--sage-light:#EAF2EB;
  --amber:#D4891A;--amber-light:#FEF5E0;
  --blue:#2D6A9F;--blue-light:#E8F0F8;
  --border:#E0D6CC;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;padding-bottom:80px;}

/* HEADER */
header{background:var(--ink);padding:1.2rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:.6rem;}
.logo h1{font-family:'DM Serif Display',serif;font-size:1.3rem;color:var(--cream);}
.db-status{display:flex;align-items:center;gap:.4rem;font-size:.7rem;color:var(--ink-muted);padding:.4rem .8rem;border:1px solid #333;border-radius:2px;white-space:nowrap;}
.db-status .dot{width:6px;height:6px;border-radius:50%;background:#555;flex-shrink:0;}
.db-status.connected .dot{background:var(--sage);}
.db-status.connected{color:#8AAE8D;border-color:#2a3d2b;}
.db-status.syncing .dot{background:var(--amber);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--ink);display:flex;z-index:100;border-top:1px solid #2a2520;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:.3rem;padding:.9rem .5rem;background:none;border:none;color:var(--ink-muted);font-family:'DM Sans',sans-serif;font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;}
.nav-btn.active{color:var(--cream);}
.nav-icon{font-size:1.3rem;}

/* PAGES */
.page{display:none;max-width:700px;margin:0 auto;padding:1.5rem 1rem;}
.page.active{display:block;}
.page-title{font-family:'DM Serif Display',serif;font-size:1.6rem;margin-bottom:1.2rem;}

/* FORM */
.form-col{display:flex;flex-direction:column;gap:.8rem;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;}
.field{display:flex;flex-direction:column;gap:.3rem;}
label{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-muted);font-weight:500;}
input,select,textarea{font-family:'DM Sans',sans-serif;font-size:.95rem;padding:.65rem .9rem;background:var(--cream);border:1px solid var(--border);border-radius:2px;color:var(--ink);outline:none;-webkit-appearance:none;transition:border-color .2s;width:100%;}
input:focus,select:focus,textarea:focus{border-color:var(--ink);}
input::placeholder,textarea::placeholder{color:var(--ink-muted);}
input[type="checkbox"]{width:18px;height:18px;cursor:pointer;flex-shrink:0;}
input[type="time"]{font-size:.9rem;}

/* BUTTONS */
.btn{font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:600;padding:.7rem 1.4rem;border:none;border-radius:2px;cursor:pointer;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-primary{background:var(--ink);color:var(--cream);}
.btn-full{width:100%;padding:.8rem;}
.btn-sm{font-size:.75rem;padding:.4rem .8rem;}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--ink-muted);}
.btn-danger{background:none;border:none;color:var(--border);font-size:1.1rem;cursor:pointer;padding:.3rem;}
.btn-danger:active{color:var(--rust);}
.btn-icon{background:none;border:none;cursor:pointer;padding:.3rem;font-size:.9rem;}

/* BADGES */
.badge{display:inline-block;padding:.15rem .5rem;border-radius:2px;font-size:.65rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;}
.badge-ok{background:var(--sage-light);color:var(--sage);}
.badge-warn{background:var(--amber-light);color:var(--amber);}
.badge-exp{background:var(--rust-light);color:var(--rust);}
.badge-blue{background:var(--blue-light);color:var(--blue);}
.badge-gray{background:#eee;color:#666;}

/* MEDICINE LIST */
.medicine-item{background:var(--warm-white);border:1px solid var(--border);border-radius:2px;display:grid;grid-template-columns:4px 1fr auto;gap:.8rem;padding:.9rem 1rem;animation:slideIn .2s ease;align-items:center;}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.status-bar{width:4px;height:32px;border-radius:2px;}
.status-ok{background:var(--sage);}
.status-warn{background:var(--amber);}
.status-exp{background:var(--rust);}
.med-name{font-family:'DM Serif Display',serif;font-size:1rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.med-meta{font-size:.72rem;color:var(--ink-muted);margin-top:.15rem;display:flex;gap:.6rem;flex-wrap:wrap;align-items:center;}

/* STOCK */
.stock-bar-wrap{margin-top:.4rem;}
.stock-label{font-size:.68rem;color:var(--ink-muted);display:flex;justify-content:space-between;margin-bottom:.2rem;}
.stock-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.stock-fill{height:100%;border-radius:2px;transition:width .4s;}
.stock-ok-fill{background:var(--sage);}
.stock-warn-fill{background:var(--amber);}
.stock-crit-fill{background:var(--rust);}

/* THERAPY CARD */
.therapy-card{background:var(--warm-white);border:1px solid var(--border);border-radius:2px;margin-bottom:.8rem;overflow:hidden;animation:slideIn .2s ease;}
.therapy-header{padding:1rem 1.2rem;display:flex;align-items:center;justify-content:space-between;gap:.8rem;cursor:pointer;user-select:none;}
.therapy-title{font-family:'DM Serif Display',serif;font-size:1.05rem;}
.therapy-body{padding:.8rem 1.2rem 1.2rem;border-top:1px solid var(--border);display:none;}
.therapy-body.open{display:block;}
.therapy-med-row{padding:.7rem 0;border-bottom:1px solid var(--border);}
.therapy-med-row:last-child{border-bottom:none;}
.posologia-text{font-size:.8rem;color:var(--ink-soft);margin-top:.15rem;}
.alarm-chips{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.35rem;}
.alarm-chip{background:var(--blue-light);color:var(--blue);font-size:.7rem;padding:.2rem .6rem;border-radius:2px;display:flex;align-items:center;gap:.3rem;}
.alarm-chip button{background:none;border:none;color:var(--blue);cursor:pointer;font-size:.85rem;line-height:1;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(26,22,18,.65);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.modal{background:var(--warm-white);border-radius:4px 4px 0 0;padding:1.5rem;width:100%;max-width:700px;max-height:92vh;overflow-y:auto;}
.modal-title{font-family:'DM Serif Display',serif;font-size:1.3rem;margin-bottom:1.2rem;}
.modal-actions{display:flex;gap:.8rem;margin-top:1.2rem;}

/* MED SELECTOR in therapy modal */
.med-selector{display:flex;flex-direction:column;gap:.5rem;max-height:200px;overflow-y:auto;border:1px solid var(--border);border-radius:2px;padding:.5rem;}
.med-selector-row{display:flex;align-items:center;gap:.7rem;padding:.4rem .2rem;border-radius:2px;cursor:pointer;}
.med-selector-row:hover{background:var(--cream);}
.med-selector-row input[type=checkbox]{margin:0;}

/* MED DETAIL IN THERAPY FORM */
.med-detail-block{background:var(--cream);border:1px solid var(--border);border-radius:2px;padding:.9rem;margin-top:.3rem;}
.med-detail-title{font-family:'DM Serif Display',serif;font-size:.9rem;margin-bottom:.7rem;display:flex;align-items:center;justify-content:space-between;}
.alarm-input-row{display:flex;align-items:center;gap:.6rem;margin-top:.3rem;}

/* FILTERS */
.filters{display:flex;gap:.3rem;flex-wrap:wrap;margin-bottom:1.2rem;}
.filter-btn{font-size:.65rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase;padding:.4rem .7rem;border:1px solid var(--border);border-radius:2px;background:transparent;color:var(--ink-muted);cursor:pointer;}
.filter-btn.active{background:var(--ink);color:var(--cream);border-color:var(--ink);}

/* ALERT */
.alert-banner{background:var(--amber-light);border:1px solid #F0C060;border-left:4px solid var(--amber);border-radius:2px;padding:.8rem 1rem;margin-bottom:1.2rem;display:none;align-items:center;gap:.6rem;font-size:.85rem;color:#7A5A10;}
.info-banner{background:var(--blue-light);border:1px solid #9bbcd4;border-left:4px solid var(--blue);border-radius:2px;padding:.8rem 1rem;margin-bottom:1rem;font-size:.85rem;color:#1a4870;}

/* EMPTY */
.empty-state{text-align:center;padding:4rem 1rem;}
.empty-icon{font-size:3rem;margin-bottom:1rem;opacity:.4;}
.empty-state p{font-family:'DM Serif Display',serif;font-size:1.1rem;color:var(--ink-soft);}
.empty-state small{font-size:.8rem;color:var(--ink-muted);display:block;margin-top:.3rem;}

/* FAB */
.fab{position:fixed;bottom:90px;right:1.2rem;width:52px;height:52px;border-radius:50%;background:var(--ink);color:var(--cream);border:none;font-size:1.5rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(26,22,18,.3);z-index:99;}

/* LOGIN */
.login-overlay{position:fixed;inset:0;background:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:1.2rem;padding:2rem;}
.login-overlay h2{font-family:'DM Serif Display',serif;font-size:2rem;color:var(--cream);}
.login-overlay p{color:var(--ink-muted);font-size:.9rem;text-align:center;max-width:320px;line-height:1.6;}
.btn-google{display:flex;align-items:center;gap:.8rem;padding:.9rem 2rem;background:var(--cream);color:var(--ink);border:none;border-radius:2px;font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:600;cursor:pointer;text-decoration:none;}
.btn-google svg{width:20px;height:20px;}

/* TOAST */
.sync-toast{position:fixed;bottom:90px;left:1rem;right:1rem;background:var(--ink);color:var(--cream);padding:.7rem 1rem;border-radius:2px;font-size:.8rem;text-align:center;opacity:0;transition:opacity .3s;pointer-events:none;z-index:300;}
.sync-toast.show{opacity:1;}

.divider{height:1px;background:var(--border);margin:.8rem 0;}
.row-between{display:flex;align-items:center;justify-content:space-between;gap:.8rem;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-overlay" id="loginOverlay">
  <div style="font-size:3.5rem">⚕</div>
  <h2>Farmacia di Casa</h2>
  <p>Accedi con Google per salvare i tuoi medicinali da qualsiasi dispositivo.</p>
  <a class="btn-google" href="login.html" target="_blank">
    <svg viewBox="0 0 48 48">
      <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.2l6.8-6.8C35.8 2.5 30.2 0 24 0 14.8 0 6.9 5.4 3 13.3l7.9 6.1C12.7 13.2 17.9 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4 6.9-9.9 6.9-17z"/>
      <path fill="#FBBC05" d="M10.9 28.6A14.8 14.8 0 0 1 9.5 24c0-1.6.3-3.1.8-4.6L2.4 13.3A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.6 10.7l8.3-6.1z"/>
      <path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.1 0-11.3-3.7-13.1-9l-7.9 6.1C6.9 42.6 14.8 48 24 48z"/>
    </svg>
    Accedi con Google
  </a>
</div>

<div class="sync-toast" id="syncToast"></div>

<header>
  <div class="logo"><span style="font-size:1.3rem">⚕</span><h1>Farmacia di Casa</h1></div>
  <div class="db-status" id="dbStatus"><div class="dot"></div><span id="dbStatusText">—</span></div>
</header>

<!-- PAGE: ARMADIETTO -->
<div class="page active" id="pageArmadietto">
  <div class="page-title">Armadietto</div>
  <div class="alert-banner" id="alertBanner">⚠️ <strong id="alertText"></strong></div>
  <div class="filters" id="armFilters">
    <button class="filter-btn active" onclick="setArmFilter('tutti',this)">Tutti</button>
    <button class="filter-btn" onclick="setArmFilter('ok',this)">✓ OK</button>
    <button class="filter-btn" onclick="setArmFilter('warn',this)">⚡ Scadenza</button>
    <button class="filter-btn" onclick="setArmFilter('exp',this)">✗ Scaduti</button>
    <button class="filter-btn" onclick="setArmFilter('scorte',this)">📦 Scorte basse</button>
  </div>
  <div id="listaMedicinali"></div>
  <button class="fab" onclick="openModal('modalMed')">+</button>
</div>

<!-- PAGE: TERAPIE -->
<div class="page" id="pageTerapie">
  <div class="page-title">Terapie</div>
  <div id="listaTerapie"></div>
  <button class="fab" onclick="apriNuovaTerapia()">+</button>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="navArmadietto" onclick="showPage('Armadietto')">
    <span class="nav-icon">💊</span>Armadietto
  </button>
  <button class="nav-btn" id="navTerapie" onclick="showPage('Terapie')">
    <span class="nav-icon">📋</span>Terapie
  </button>
</nav>

<!-- ===================== MODAL: MEDICINALE ===================== -->
<div class="modal-overlay" id="modalMed" style="display:none" onclick="closeModalOutside(event,'modalMed')">
  <div class="modal">
    <div class="modal-title">Aggiungi medicinale</div>
    <div class="form-col">
      <div class="field"><label>Nome *</label><input type="text" id="mNome" placeholder="es. Tachipirina 1000mg"/></div>
      <div class="form-row">
        <div class="field">
          <label>Categoria</label>
          <select id="mCategoria">
            <option>Analgesico</option><option>Antibiotico</option><option>Antinfiammatorio</option>
            <option>Antiistaminico</option><option>Gastrointestinale</option><option>Vitamina/Integratore</option>
            <option>Collirio/Nasale</option><option>Cerotti/Bende</option><option>Altro</option>
          </select>
        </div>
        <div class="field"><label>Scadenza</label><input type="month" id="mScadenza"/></div>
      </div>
      <div class="form-row">
        <div class="field"><label>Quantità disponibile</label><input type="number" id="mQuantita" placeholder="es. 20" min="0"/></div>
        <div class="field"><label>Unità</label>
          <select id="mUnita">
            <option value="compresse">Compresse</option><option value="capsule">Capsule</option>
            <option value="bustine">Bustine</option><option value="ml">ml</option>
            <option value="fiale">Fiale</option><option value="cerotti">Cerotti</option><option value="pezzi">Pezzi</option>
          </select>
        </div>
      </div>
      <div class="field"><label>Note</label><input type="text" id="mNote" placeholder="opzionale"/></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary btn-full" onclick="salvaMedicinale()">Salva</button>
      <button class="btn btn-ghost" onclick="closeModal('modalMed')">Annulla</button>
    </div>
  </div>
</div>

<!-- ===================== MODAL: NUOVA TERAPIA ===================== -->
<div class="modal-overlay" id="modalTerapia" style="display:none" onclick="closeModalOutside(event,'modalTerapia')">
  <div class="modal">
    <div class="modal-title">Nuova terapia</div>

    <!-- Step 1: info base -->
    <div id="tStep1">
      <div class="form-col">
        <div class="field"><label>Nome terapia *</label><input type="text" id="tNome" placeholder="es. Antibiotico post-operazione"/></div>
        <div class="field"><label>Note / Indicazioni medico</label><textarea id="tNote" rows="2" placeholder="es. Prendere a stomaco pieno"></textarea></div>
        <div class="divider"></div>

        <!-- Durata -->
        <div style="display:flex;align-items:center;gap:.8rem;">
          <input type="checkbox" id="tCronica" onchange="toggleCronica()"/>
          <label for="tCronica" style="font-size:.85rem;text-transform:none;letter-spacing:0;color:var(--ink);cursor:pointer">Terapia cronica (senza data di fine)</label>
        </div>
        <div class="form-row" id="tDateWrap">
          <div class="field"><label>Data inizio</label><input type="date" id="tInizio"/></div>
          <div class="field"><label>Data fine</label><input type="date" id="tFine"/></div>
        </div>
        <div class="field" id="tInizioCronicaWrap" style="display:none">
          <label>Data inizio</label><input type="date" id="tInizioCronica"/>
        </div>

        <div class="divider"></div>

        <!-- Selezione medicinali dall'armadietto -->
        <div style="font-size:.75rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:.4rem">
          Medicinali inclusi *
        </div>
        <div id="tMedSelectorWrap"></div>

        <div id="tMedDetails"></div>
      </div>

      <div class="modal-actions">
        <button class="btn btn-primary btn-full" onclick="salvaTerapia()">Salva terapia</button>
        <button class="btn btn-ghost" onclick="closeModal('modalTerapia')">Annulla</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const fbApp = initializeApp({
  apiKey:"AIzaSyA90AnXrXPimDjwF6EGLppGW5SnSQnVxvY",
  authDomain:"farmacia-di-casa-5020f.firebaseapp.com",
  projectId:"farmacia-di-casa-5020f",
  storageBucket:"farmacia-di-casa-5020f.firebasestorage.app",
  messagingSenderId:"421483950970",
  appId:"1:421483950970:web:7bbf5952daf0034364dcc3"
});
const auth = getAuth(fbApp);
const db   = getFirestore(fbApp);

let uid = null;
let medicinali = [];
let terapie = [];
let armFilter = 'tutti';

// terapiaForm: stato locale del form nuova terapia
// { selectedMeds: { [medId]: { dosi, qxDose, istr, alarms:[] } } }
let terapiaForm = { selectedMeds: {} };

let unsubMed = null, unsubTer = null;

// ---- AUTH ----
onAuthStateChanged(auth, user => {
  if (user) {
    uid = user.uid;
    document.getElementById('loginOverlay').style.display = 'none';
    setStatus('connected','Firebase ✓');
    startListeners();
    requestNotifPerm();
  } else {
    uid = null;
    document.getElementById('loginOverlay').style.display = 'flex';
    setStatus('','—');
  }
});

function startListeners() {
  if (unsubMed) unsubMed();
  if (unsubTer) unsubTer();
  unsubMed = onSnapshot(
    query(collection(db,'users',uid,'medicinali'), orderBy('nome','asc')),
    snap => { medicinali = snap.docs.map(d=>({id:d.id,...d.data()})); renderArmadietto(); }
  );
  unsubTer = onSnapshot(
    query(collection(db,'users',uid,'terapie'), orderBy('createdAt','desc')),
    snap => { terapie = snap.docs.map(d=>({id:d.id,...d.data()})); renderTerapie(); }
  );
}

// ---- NOTIFICATIONS ----
async function requestNotifPerm() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') await Notification.requestPermission();
}

async function scheduleAlarm(nome, time, dettaglio) {
  if ('serviceWorker' in navigator) {
    const reg = await navigator.serviceWorker.ready;
    if (reg.active) reg.active.postMessage({ type:'SCHEDULE_ALARM', nome, time, dettaglio });
  }
}

// ---- STATUS / TOAST ----
function setStatus(cls,txt) {
  const el=document.getElementById('dbStatus');
  el.className='db-status '+cls;
  document.getElementById('dbStatusText').textContent=txt;
}
function showToast(msg) {
  const t=document.getElementById('syncToast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ---- HELPERS ----
function getScadStatus(s) {
  if (!s) return 'ok';
  const [y,m]=s.split('-').map(Number);
  const d=(new Date(y,m,0)-new Date())/86400000;
  return d<0?'exp':d<=90?'warn':'ok';
}
function fmtDate(s) {
  if (!s) return '—';
  const [y,m]=s.split('-');
  return ['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'][+m-1]+' '+y;
}
function fmtDateFull(s) {
  if (!s) return '—';
  const [y,m,d]=s.split('-');
  return `${d}/${m}/${y}`;
}
function catIcon(c) {
  return {Analgesico:'🩹',Antibiotico:'💉',Antinfiammatorio:'🔥',Antiistaminico:'🌿',
    Gastrointestinale:'🫀','Vitamina/Integratore':'💊','Collirio/Nasale':'👁','Cerotti/Bende':'🩹',Altro:'📦'}[c]||'💊';
}
function shake(el) {
  el.style.animation='none'; el.offsetHeight;
  el.style.animation='shake .3s ease';
  el.addEventListener('animationend',()=>el.style.animation='',{once:true});
}
function consumoGiornaliero(medId) {
  const oggi=new Date().toISOString().split('T')[0];
  let tot=0;
  terapie.forEach(t=>{
    if (!t.attiva) return;
    if (!t.cronica && t.fine && t.fine<oggi) return;
    (t.medicinali||[]).forEach(m=>{ if(m.medId===medId) tot+=(parseFloat(m.posDosi)||0)*(parseFloat(m.posQxDose)||0); });
  });
  return tot;
}
function giorniScorte(med) {
  const c=consumoGiornaliero(med.id);
  if (!c||!med.quantita) return null;
  return Math.floor(parseFloat(med.quantita)/c);
}

// ---- NAVIGATION ----
window.showPage = name => {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page'+name).classList.add('active');
  document.getElementById('nav'+name).classList.add('active');
};

window.setArmFilter = (f,btn) => {
  armFilter=f;
  document.querySelectorAll('#armFilters .filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderArmadietto();
};

// ---- MODAL ----
window.openModal = id => document.getElementById(id).style.display='flex';
window.closeModal = id => document.getElementById(id).style.display='none';
window.closeModalOutside = (e,id) => { if(e.target.classList.contains('modal-overlay')) closeModal(id); };

// ---- RENDER ARMADIETTO ----
function renderArmadietto() {
  const lista=document.getElementById('listaMedicinali');
  let items=medicinali.filter(m=>{
    const s=getScadStatus(m.scadenza);
    if (armFilter==='tutti') return true;
    if (armFilter==='scorte') { const g=giorniScorte(m); return g!==null&&g<=14; }
    return s===armFilter;
  });

  const exp=medicinali.filter(m=>getScadStatus(m.scadenza)==='exp').length;
  const warn=medicinali.filter(m=>getScadStatus(m.scadenza)==='warn').length;
  const sb=medicinali.filter(m=>{ const g=giorniScorte(m); return g!==null&&g<=14; }).length;
  const banner=document.getElementById('alertBanner');
  const parts=[];
  if (exp) parts.push(`${exp} scadut${exp>1?'i':'o'}`);
  if (warn) parts.push(`${warn} in scadenza`);
  if (sb) parts.push(`${sb} in esaurimento`);
  if (parts.length) { document.getElementById('alertText').textContent=parts.join(' · '); banner.style.display='flex'; }
  else banner.style.display='none';

  if (!items.length) {
    lista.innerHTML=`<div class="empty-state"><div class="empty-icon">💊</div><p>Nessun medicinale</p><small>Tocca + per aggiungerne uno</small></div>`;
    return;
  }
  lista.innerHTML=items.map(m=>{
    const s=getScadStatus(m.scadenza);
    const giorni=giorniScorte(m);
    const consumo=consumoGiornaliero(m.id);
    let stockHtml='';
    if (m.quantita && consumo>0) {
      const pct=Math.min(100,Math.round((giorni/30)*100));
      const cls=giorni<=3?'stock-crit-fill':giorni<=14?'stock-warn-fill':'stock-ok-fill';
      stockHtml=`<div class="stock-bar-wrap"><div class="stock-label"><span>📦 ${m.quantita} ${m.unita||''}</span><span>${giorni} giorni rimasti</span></div><div class="stock-bar"><div class="stock-fill ${cls}" style="width:${pct}%"></div></div></div>`;
    } else if (m.quantita) {
      stockHtml=`<div style="font-size:.72rem;color:var(--ink-muted);margin-top:.3rem">📦 ${m.quantita} ${m.unita||''}</div>`;
    }
    return `<div class="medicine-item">
      <div class="status-bar status-${s}"></div>
      <div style="min-width:0">
        <div class="med-name">${m.nome}</div>
        <div class="med-meta">
          <span>${catIcon(m.categoria)} ${m.categoria}</span>
          <span>📅 ${fmtDate(m.scadenza)}</span>
          ${s==='exp'?'<span class="badge badge-exp">Scaduto</span>':s==='warn'?'<span class="badge badge-warn">In scadenza</span>':'<span class="badge badge-ok">Valido</span>'}
        </div>
        ${stockHtml}
        ${m.note?`<div style="font-size:.72rem;color:var(--ink-muted);margin-top:.25rem;font-style:italic">${m.note}</div>`:''}
      </div>
      <button class="btn-danger" onclick="eliminaMed('${m.id}')">✕</button>
    </div>`;
  }).join('');
}

// ---- RENDER TERAPIE ----
function renderTerapie() {
  const lista=document.getElementById('listaTerapie');
  if (!terapie.length) {
    lista.innerHTML=`<div class="empty-state"><div class="empty-icon">📋</div><p>Nessuna terapia</p><small>Tocca + per crearne una</small></div>`;
    return;
  }
  const oggi=new Date().toISOString().split('T')[0];
  lista.innerHTML=terapie.map(t=>{
    const scaduta=!t.cronica&&t.fine&&t.fine<oggi;
    const statusBadge=scaduta?'<span class="badge badge-exp">Terminata</span>':t.attiva?'<span class="badge badge-ok">Attiva</span>':'<span class="badge badge-gray">In pausa</span>';
    const durata=t.cronica?`Cronica — dal ${fmtDateFull(t.inizio)}`:`${fmtDateFull(t.inizio)} → ${fmtDateFull(t.fine)}`;
    const meds=(t.medicinali||[]).map(m=>{
      const medInfo=medicinali.find(x=>x.id===m.medId);
      const nome=medInfo?medInfo.nome:m.nome||'?';
      const alarmsHtml=(m.alarms||[]).map(a=>
        `<span class="alarm-chip">🔔 ${a} <button onclick="removeAlarm('${t.id}','${m.medId}','${a}')">✕</button></span>`
      ).join('');
      return `<div class="therapy-med-row">
        <div class="row-between">
          <div>
            <div style="font-family:'DM Serif Display',serif;font-size:.95rem">${nome}</div>
            <div class="posologia-text">${m.posDosi}× al giorno — ${m.posQxDose} ${medInfo?.unita||''}${m.posIstr?' — '+m.posIstr:''}</div>
            <div class="alarm-chips">${alarmsHtml||'<span style="font-size:.72rem;color:var(--ink-muted)">Nessuna sveglia</span>'}</div>
          </div>
          <button class="btn-danger" onclick="removeMedFromTerapia('${t.id}','${m.medId}')">✕</button>
        </div>
      </div>`;
    }).join('');
    return `<div class="therapy-card">
      <div class="therapy-header" onclick="toggleTerapia('tc-${t.id}')">
        <div>
          <div class="therapy-title">${t.nome}</div>
          <div style="font-size:.75rem;color:var(--ink-muted);margin-top:.2rem;display:flex;gap:.6rem;align-items:center">${durata} ${statusBadge}</div>
        </div>
        <div style="display:flex;gap:.4rem;align-items:center;flex-shrink:0">
          <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();toggleAttiva('${t.id}',${t.attiva})">${t.attiva?'⏸':'▶'}</button>
          <button class="btn-danger" onclick="event.stopPropagation();eliminaTerapia('${t.id}')">✕</button>
        </div>
      </div>
      <div class="therapy-body" id="tc-${t.id}">
        ${t.note?`<p style="font-size:.82rem;color:var(--ink-muted);font-style:italic;padding:.5rem 0 .8rem">${t.note}</p>`:''}
        ${meds||'<p style="font-size:.82rem;color:var(--ink-muted);padding:.5rem 0">Nessun medicinale.</p>'}
      </div>
    </div>`;
  }).join('');
}

// ---- MEDICINALE ACTIONS ----
window.salvaMedicinale = async () => {
  const nome=document.getElementById('mNome').value.trim();
  if (!nome||!uid) { shake(document.querySelector('#modalMed .modal')); return; }
  setStatus('syncing','Salvo...');
  try {
    await addDoc(collection(db,'users',uid,'medicinali'),{
      nome, scadenza:document.getElementById('mScadenza').value,
      categoria:document.getElementById('mCategoria').value,
      quantita:parseFloat(document.getElementById('mQuantita').value)||null,
      unita:document.getElementById('mUnita').value,
      note:document.getElementById('mNote').value.trim(),
      createdAt:Date.now()
    });
    setStatus('connected','Firebase ✓');
    showToast('✓ Medicinale aggiunto');
    closeModal('modalMed');
    ['mNome','mScadenza','mQuantita','mNote'].forEach(id=>document.getElementById(id).value='');
  } catch(e){ console.error(e); setStatus('','Errore'); }
};

window.eliminaMed = async id => {
  if (!uid) return;
  await deleteDoc(doc(db,'users',uid,'medicinali',id));
  showToast('✓ Eliminato');
};

// ---- NUOVA TERAPIA ----
window.apriNuovaTerapia = () => {
  // Controlla se ci sono medicinali in armadietto
  if (!medicinali.length) {
    alert('⚠️ Armadietto vuoto!\n\nPer creare una terapia devi prima caricare almeno un medicinale nell\'armadietto.\n\nTorna alla sezione Armadietto e tocca + per aggiungere i tuoi medicinali.');
    showPage('Armadietto');
    return;
  }
  // Reset form
  terapiaForm = { selectedMeds: {} };
  ['tNome','tNote','tInizio','tFine','tInizioCronica'].forEach(id=>{ const el=document.getElementById(id); if(el) el.value=''; });
  document.getElementById('tCronica').checked=false;
  toggleCronica();
  renderTMedSelector();
  renderTMedDetails();
  openModal('modalTerapia');
};

window.toggleCronica = () => {
  const c=document.getElementById('tCronica').checked;
  document.getElementById('tDateWrap').style.display=c?'none':'grid';
  document.getElementById('tInizioCronicaWrap').style.display=c?'block':'none';
};

// Render checkbox list di medicinali
function renderTMedSelector() {
  const wrap=document.getElementById('tMedSelectorWrap');
  wrap.innerHTML=`<div class="med-selector">${
    medicinali.map(m=>`
      <label class="med-selector-row">
        <input type="checkbox" ${terapiaForm.selectedMeds[m.id]?'checked':''} onchange="toggleMedInForm('${m.id}','${m.nome.replace(/'/g,"\\'")}')"/>
        <span style="font-size:.9rem">${catIcon(m.categoria)} <strong>${m.nome}</strong></span>
        <span style="font-size:.72rem;color:var(--ink-muted);margin-left:auto">${m.unita||''}</span>
      </label>`
    ).join('')
  }</div>`;
}

// Toggle selezione medicinale nel form terapia
window.toggleMedInForm = (medId, medNome) => {
  if (terapiaForm.selectedMeds[medId]) {
    delete terapiaForm.selectedMeds[medId];
  } else {
    terapiaForm.selectedMeds[medId] = { nome:medNome, dosi:1, qxDose:1, istr:'', alarms:[] };
  }
  renderTMedDetails();
};

// Render blocchi posologia + sveglie per ogni medicinale selezionato
function renderTMedDetails() {
  const wrap=document.getElementById('tMedDetails');
  const selected=Object.entries(terapiaForm.selectedMeds);
  if (!selected.length) { wrap.innerHTML=''; return; }

  wrap.innerHTML=`<div class="divider"></div><div style="font-size:.75rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:.6rem">Posologia e sveglie</div>`+
    selected.map(([medId, data])=>{
      const medInfo=medicinali.find(m=>m.id===medId);
      const alarmInputs=(data.alarms||[]).map((a,i)=>
        `<div class="alarm-input-row">
          <input type="time" value="${a}" onchange="updateFormAlarm('${medId}',${i},this.value)"/>
          <button class="btn-danger" onclick="removeFormAlarm('${medId}',${i})">✕</button>
        </div>`
      ).join('');
      return `<div class="med-detail-block">
        <div class="med-detail-title">
          <span>${catIcon(medInfo?.categoria||'Altro')} ${data.nome}</span>
        </div>
        <div class="form-col">
          <div class="form-row">
            <div class="field"><label>Dosi al giorno</label>
              <input type="number" min="1" max="20" value="${data.dosi}" onchange="updateFormField('${medId}','dosi',parseFloat(this.value))"/>
            </div>
            <div class="field"><label>Quantità per dose</label>
              <input type="number" min="0.5" step="0.5" value="${data.qxDose}" onchange="updateFormField('${medId}','qxDose',parseFloat(this.value))"/>
            </div>
          </div>
          <div class="field"><label>Istruzioni (es. a stomaco pieno)</label>
            <input type="text" value="${data.istr}" placeholder="opzionale" onchange="updateFormField('${medId}','istr',this.value)"/>
          </div>
          <div>
            <div style="font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-muted);font-weight:500;margin-bottom:.4rem">🔔 Sveglie</div>
            <div id="alarms-${medId}">${alarmInputs}</div>
            <button class="btn btn-ghost btn-sm" style="margin-top:.4rem" onclick="addFormAlarm('${medId}')">+ Aggiungi orario</button>
          </div>
        </div>
      </div>`;
    }).join('');
}

window.updateFormField = (medId,field,value) => {
  if (terapiaForm.selectedMeds[medId]) terapiaForm.selectedMeds[medId][field]=value;
};
window.updateFormAlarm = (medId,idx,value) => {
  if (terapiaForm.selectedMeds[medId]) terapiaForm.selectedMeds[medId].alarms[idx]=value;
};
window.addFormAlarm = medId => {
  if (terapiaForm.selectedMeds[medId]) {
    terapiaForm.selectedMeds[medId].alarms.push('08:00');
    renderTMedDetails();
  }
};
window.removeFormAlarm = (medId,idx) => {
  if (terapiaForm.selectedMeds[medId]) {
    terapiaForm.selectedMeds[medId].alarms.splice(idx,1);
    renderTMedDetails();
  }
};

// ---- SALVA TERAPIA ----
window.salvaTerapia = async () => {
  const nome=document.getElementById('tNome').value.trim();
  if (!nome) { shake(document.querySelector('#modalTerapia .modal')); showToast('⚠️ Inserisci il nome della terapia'); return; }
  if (!Object.keys(terapiaForm.selectedMeds).length) { showToast('⚠️ Seleziona almeno un medicinale'); return; }
  if (!uid) return;

  const cronica=document.getElementById('tCronica').checked;
  const inizio=cronica?document.getElementById('tInizioCronica').value:document.getElementById('tInizio').value;
  const fine=cronica?null:document.getElementById('tFine').value;

  const medicinaliTerapia=Object.entries(terapiaForm.selectedMeds).map(([medId,data])=>({
    medId, nome:data.nome,
    posDosi:data.dosi||1,
    posQxDose:data.qxDose||1,
    posIstr:data.istr||'',
    alarms:data.alarms||[]
  }));

  setStatus('syncing','Salvo...');
  try {
    await addDoc(collection(db,'users',uid,'terapie'),{
      nome, note:document.getElementById('tNote').value.trim(),
      cronica, inizio, fine,
      attiva:true,
      medicinali:medicinaliTerapia,
      createdAt:Date.now()
    });
    // Programma sveglie
    medicinaliTerapia.forEach(m=>{
      (m.alarms||[]).forEach(t=>scheduleAlarm(m.nome,t,`${m.posDosi}× ${m.posQxDose}${m.posIstr?' — '+m.posIstr:''}`));
    });
    setStatus('connected','Firebase ✓');
    showToast('✓ Terapia salvata');
    closeModal('modalTerapia');
  } catch(e){ console.error(e); setStatus('','Errore'); }
};

// ---- TERAPIA ACTIONS ----
window.eliminaTerapia = async id => {
  if (!uid) return;
  await deleteDoc(doc(db,'users',uid,'terapie',id));
  showToast('✓ Terapia eliminata');
};
window.toggleAttiva = async (id,attiva) => {
  if (!uid) return;
  await updateDoc(doc(db,'users',uid,'terapie',id),{attiva:!attiva});
};
window.toggleTerapia = id => document.getElementById(id).classList.toggle('open');
window.removeMedFromTerapia = async (terapiaId,medId) => {
  const t=terapie.find(x=>x.id===terapiaId);
  if (!t||!uid) return;
  await updateDoc(doc(db,'users',uid,'terapie',terapiaId),{medicinali:(t.medicinali||[]).filter(m=>m.medId!==medId)});
  showToast('✓ Rimosso');
};
window.removeAlarm = async (terapiaId,medId,alarmTime) => {
  const t=terapie.find(x=>x.id===terapiaId);
  if (!t||!uid) return;
  const meds=(t.medicinali||[]).map(m=>m.medId!==medId?m:{...m,alarms:(m.alarms||[]).filter(a=>a!==alarmTime)});
  await updateDoc(doc(db,'users',uid,'terapie',terapiaId),{medicinali:meds});
};

// ---- SERVICE WORKER ----
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(console.error);
</script>
